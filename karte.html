<style>
  :root {
    --bg: #0a0a1a;
    --panel: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.15);
    --accent: #4a9eff;
    --text: #fff;
    --text-dim: rgba(255,255,255,0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 0.8em 1em;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.6em;
  }
  header h1 { font-size: 1.1em; }
  header .meta { color: var(--text-dim); font-size: 0.85em; }
  header a.back {
    color: var(--accent);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 0.85em;
  }
  header a.back:hover { background: rgba(74,158,255,0.15); }
  #map { flex: 1; }
  .leaflet-popup-content-wrapper {
    background: #1a1a2e;
    color: var(--text);
    border-radius: 8px;
  }
  .leaflet-popup-tip { background: #1a1a2e; }
  .leaflet-popup-content a { color: var(--accent); }
  .popup-title { font-weight: 600; margin-bottom: 4px; }
  .popup-company { color: var(--text-dim); font-size: 0.85em; margin-bottom: 4px; }
  .popup-loc { color: var(--text-dim); font-size: 0.8em; margin-bottom: 6px; }
  .home-marker {
    background: #e63946;
    border: 3px solid #fff;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 0 4px rgba(230,57,70,0.4), 0 4px 12px rgba(0,0,0,0.5);
  }
</style>
</head>

  if (radius2M !== null) {
    L.circle([homeLat, homeLon], {

      color: '#ffc107', weight: 2, opacity: 0.6,
      fillColor: '#ffc107', fillOpacity: 0.04,

  }
  if (radiusM !== null) {
    L.circle([homeLat, homeLon], {
      radius: radiusM,
      color: '#00d68f', weight: 2, opacity: 0.7,
      fillColor: '#00d68f', fillOpacity: 0.06,

  }
  L.marker([homeLat, homeLon], {
    icon: L.divIcon({
      html: '<div class="home-marker">&#127968;</div>',
      className: '',

      iconAnchor: [18, 18]

    zIndexOffset: 1000

}
markers.forEach(function(m) {
  var popup = '<div class="popup-title">' + m.title + '</div>'
            + '<div class="popup-company">' + m.company + '</div>'
            + '<div class="popup-loc">' + m.location + ' &middot; ' + m.source + '</div>'
            + '<a href="' + m.url + '" target="_blank">Stellenanzeige &rarr;</a>';
  L.marker([m.lat, m.lon]).addTo(map).bindPopup(popup);
});
</script>
